name: CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: Julia 1.12 - Ubuntu
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v2
        with:
          version: "1.12"

      - uses: julia-actions/cache@v2

      - uses: julia-actions/julia-runtest@v1
